---
- name: Configurar Router CSR1000v (IPv6 y Respaldo)
  hosts: routers
  gather_facts: no
  tasks:
    - name: Configurar Interfaz Loopback 33 con IPv6
      ios_config:
        lines:
          - ipv6 address 3001:ABCD:ABCD:1::1/128
          - ipv6 address FE80::1 link-local
        parents: interface Loopback33

    - name: Ejecutar show running-config para respaldo
      ios_command:
        commands: show running-config
      register: backup_output

    - name: Guardar respaldo en archivo local
      copy:
        content: "{{ backup_output.stdout[0] }}"
        dest: "./respaldo_router.txt"

- name: Instalar y configurar Apache en puerto 9999
  hosts: webservers
  become: yes
  tasks:
    - name: Instalar servicio Apache2
      apt:
        name: apache2
        state: present
        update_cache: yes

    - name: Cambiar puerto de escucha a 9999
      lineinfile:
        path: /etc/apache2/ports.conf
        regexp: '^Listen '
        line: 'Listen 9999'

    - name: Cambiar puerto en VirtualHost
      lineinfile:
        path: /etc/apache2/sites-available/000-default.conf
        regexp: '<VirtualHost \*:.*>'
        line: '<VirtualHost *:9999>'

    - name: Reiniciar servicio Apache2 para aplicar cambios
      service:
        name: apache2
        state: restarted
